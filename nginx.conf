server {
    listen 80;
    server_name localhost;

    # Local development SSL (Optional - will only work if files are mounted)
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend (HTTPS)
    location /api/ {
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $backend_upstream https://employee-back-wwa3.onrender.com;
        proxy_pass $backend_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host employee-back-wwa3.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger proxy
    location /swagger-ui/ {
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $swagger_upstream https://employee-back-wwa3.onrender.com;
        proxy_pass $swagger_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host employee-back-wwa3.onrender.com;
    }
    location /v3/api-docs {
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $docs_upstream https://employee-back-wwa3.onrender.com;
        proxy_pass $docs_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host employee-back-wwa3.onrender.com;
    }

    # Actuator proxy
    location /actuator/ {
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $actuator_upstream https://employee-back-wwa3.onrender.com;
        proxy_pass $actuator_upstream;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host employee-back-wwa3.onrender.com;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
