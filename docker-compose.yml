version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ems-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    networks:
      - ems-frontend-network

networks:
  ems-frontend-network:
    driver: bridge
